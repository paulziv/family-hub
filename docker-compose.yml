version: "3.8"

services:
  family-hub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: family-hub
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
